<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Las Aventuras del Agente Juan Martín</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== SCREEN 1: INTRO ===== -->
  <div id="screen-intro" class="screen active">
    <div class="intro-bg">
      <div class="intro-inner">
        <div class="intro-pill">🌎 La Gran Expedición 2026</div>
        <div class="intro-emoji">🧒🏻</div>
        <h1 class="intro-h1">Las Aventuras del<br><span>Agente Juan Martín</span></h1>
        <p class="intro-p">Mamá recibió una misión ultrasecreta. Solo un explorador muy valiente podía completarla. <strong>Ese explorador eres tú.</strong></p>
        <button class="btn-xl" onclick="goMap()">🗺️ Empezar aventura</button>
        <div class="intro-stats" id="introStats"></div>
      </div>
    </div>
  </div>

  <!-- ===== SCREEN 2: MAPA ===== -->
  <div id="screen-map" class="screen">
    <div class="top-bar">
      <div class="top-left">
        <span class="top-avatar">🧒🏻</span>
        <div>
          <div class="top-rank" id="topRank">Explorador Junior</div>
          <div class="top-level">Nivel <strong id="topLevel">1</strong></div>
        </div>
      </div>
      <div class="top-right">
        <div class="top-pts" id="topPts">0 pts</div>
        <div class="top-bdg">🏅 <span id="topBadges">0</span></div>
      </div>
    </div>
    <div class="xp-wrap"><div class="xp-fill" id="xpFill"></div></div>
    <div class="map-inner">
      <div class="map-title-row">
        <h2>🗺️ Mi mapa de aventura</h2>
        <div class="map-sub" id="mapSub">0 misiones completadas</div>
      </div>
      <div id="destGrid" class="dest-grid"></div>
      <div class="badges-wrap">
        <h2>🏅 Mis insignias</h2>
        <div id="badgesGrid" class="badges-grid"></div>
      </div>
      <div class="map-footer-btns">
        <button class="btn-navy" onclick="goIntro()">⬅️ Inicio</button>
        <button class="btn-teal" onclick="window.print()">🖨️ Imprimir</button>
        <button class="btn-coral" onclick="resetAdventure()">🔄 Reiniciar</button>
      </div>
    </div>
  </div>

  <!-- ===== SCREEN 3: DESTINO ===== -->
  <div id="screen-dest" class="screen">
    <div id="destContent"></div>
  </div>

  <div id="toast"></div>
  <div id="confetti"></div>

  <script src="app.js"></script>
</body>
</html>
